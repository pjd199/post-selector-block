name: Manual WordPress Plugin Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Plugin Version
        id: get_version
        run: |
          VERSION=$(grep -m 1 "Version:" post-selector.php | awk '{print $NF}' | tr -d '\r')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if Release Exists
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if the tag already exists in GitHub Releases
          if gh release view ${{ steps.get_version.outputs.tag }} >/dev/null 2>&1; then
            echo "Release ${{ steps.get_version.outputs.tag }} already exists. Skipping..."
            echo "exists=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Plugin for Zipping
        if: steps.check_release.outputs.exists == 'false'
        run: |
          mkdir -p post-selector
          cp post-selector.php post-selector/
          cp post-selector.js post-selector/
          cp README.md post-selector/

      - name: Create Zip Archive
        if: steps.check_release.outputs.exists == 'false'
        run: |
          zip -r post-selector.zip post-selector/

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          files: post-selector.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
