name: Manual WordPress Plugin Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Plugin Version
        id: get_version
        run: |
          # Look for version in the src directory
          VERSION=$(grep -m 1 "Version:" src/post-selector.php | awk '{print $NF}' | tr -d '\r')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Validate Release Version
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view v${{ env.VERSION }} >/dev/null 2>&1; then
            echo "::error::Release v${{ env.VERSION }} already exists! Please update the version in src/post-selector.php before running."
            exit 1
          else
            echo "Version is new. Proceeding..."
          fi

      - name: Prepare Plugin for Zipping
        run: |
          # 1. Create the destination folder
          mkdir -p post-selector
          
          # 2. Copy everything from src into the plugin folder
          cp -r src/* post-selector/
          
          # 3. Include the README from the root if it's there
          if [ -f README.md ]; then cp README.md post-selector/; fi

      - name: Create Zip Archive
        run: |
          # Zip the folder so it extracts as post-selector/file.php
          zip -r post-selector.zip post-selector/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: post-selector.zip
          generate_release_notes: true # Bonus: Auto-generates changelog from commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
